<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Felicity</title>
    <!-- Apply theme before first paint to avoid a flash of wrong colors. -->
    <script>
        (function(){var t=localStorage.getItem("felicity_theme");if(t)document.documentElement.setAttribute("data-theme",t);})();
    </script>
    <link href="theme.css" rel="stylesheet">
    <link href="layout.css" rel="stylesheet">
    <link href="content.css" rel="stylesheet">
    <link href="player-bar.css" rel="stylesheet">
    <link href="overlays.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body>

<!--
    Root layout: two side-by-side columns.
    Left column = all navigable screens (grows to fill space).
    Right column = player pane (fixed width, slides in when a song plays).
-->
<div class="app-layout">

    <!--
        Left column split into two rows:
        top row = the screens themselves (grows to fill space),
        bottom row = persistent navigation tabs.
    -->
    <div class="screens-container">

        <!-- All screens stack here — only one is visible at a time. -->
        <div class="screens-stack">

            <!-- Dashboard / Home screen -->
            <div class="screen active" id="screenDashboard">
                <div class="dash-header">
                    <div class="dash-header-left">
                        <img alt="Felicity" class="app-icon" onerror="this.style.display='none'"
                             src="/app-icon">
                        <span class="brand-name">Felicity</span>
                    </div>
                    <button class="icon-btn" id="themeToggle" title="Toggle light / dark">
                        <span class="material-icons-round" id="themeIcon">dark_mode</span>
                    </button>
                </div>
                <div class="screen-body" id="dashboardBody">
                    <div class="empty-state">
                        <span class="material-icons-round empty-icon">hourglass_empty</span>
                        <p class="empty-title">Loading library…</p>
                    </div>
                </div>
            </div>

            <!--
                Shared library screen — Songs, Albums, Artists, and Genres all use this
                same screen. The header and content body update per section.
            -->
            <div class="screen hidden" id="screenLibrary">
                <div class="lib-header">
                    <!-- Home button takes you back to the dashboard. -->
                    <button class="icon-btn" id="homeBtn" title="Back to Home">
                        <span class="material-icons-round">home</span>
                    </button>
                <button class="back-btn hidden" id="backBtn">
                    <span class="material-icons-round">arrow_back_ios_new</span>
                    <span id="backLabel">Back</span>
                </button>
                <span class="section-title" id="sectionTitle">Songs</span>
                <span class="item-count" id="itemCount"></span>
                    <div class="search-bar">
                        <span class="material-icons-round">search</span>
                        <input autocomplete="off" id="searchInput" placeholder="Search…"
                               type="text">
                    </div>
                    <button class="icon-btn" id="viewToggle" title="Switch to grid view">
                        <span class="material-icons-round" id="viewToggleIcon">grid_view</span>
                    </button>
                </div>
                <div class="screen-body" id="contentBody">
                    <div class="empty-state">
                        <span class="material-icons-round empty-icon">hourglass_empty</span>
                        <p class="empty-title">Loading…</p>
                    </div>
                </div>
            </div>

        </div><!-- end .screens-stack -->


    </div><!-- end .screens-container -->

    <!--
        Right-side player pane.
        Slides in from the right when a song starts playing.
        Closed by clicking the × button at the top right.
        About 25% of the viewport width on desktop.
    -->
    <aside class="player-pane" id="playerPane">
        <div class="player-pane-inner">
            <div class="player-pane-top">
                <span class="player-pane-label">Now Playing</span>
                <button class="icon-btn" id="playerCloseBtn" title="Close player">
                    <span class="material-icons-round">close</span>
                </button>
            </div>
            <div class="player-art-wrap">
                <span class="material-icons-round player-art-ph">music_note</span>
                <img alt="" class="player-art" id="playerArt">
            </div>
            <div class="player-meta">
                <p class="player-title" id="nowTitle">Nothing playing</p>
                <p class="player-artist" id="nowArtist">—</p>
            </div>
            <!-- Canvas draws the waveform bars; the range input sits on top for interaction. -->
            <div class="player-waveform-wrap">
                <canvas class="waveform-canvas" id="waveformCanvas"></canvas>
                <input class="seek-slider" disabled id="seekBar" max="100" min="0"
                       step="0.1" type="range" value="0">
            </div>
            <div class="player-time">
                <span id="elapsed">0:00</span>
                <span id="remaining">0:00</span>
            </div>
            <div class="player-controls">
                <button class="ctrl-btn" id="prevBtn">
                    <span class="material-icons-round">skip_previous</span>
                </button>
                <button class="ctrl-btn play-btn" id="playBtn">
                    <span class="material-icons-round" id="playIcon">play_arrow</span>
                </button>
                <button class="ctrl-btn" id="nextBtn">
                    <span class="material-icons-round">skip_next</span>
                </button>
            </div>
            <div class="player-vol-row">
                <span class="material-icons-round vol-icon" id="volIcon">volume_down</span>
                <input class="vol-slider-h" id="volBar" max="100" min="0" type="range" value="100">
                <span class="material-icons-round vol-icon">volume_up</span>
            </div>
        </div>
    </aside>

</div>

<!--
    Floating "Now Playing" button — appears in the bottom-right corner
    when a song is playing but the player pane has been closed. Tap it to
    slide the player back in without having to hunt for it.
-->
<button class="player-fab hidden" id="playerFab" title="Now Playing">
    <span class="material-icons-round">queue_music</span>
</button>

<!-- Right-click context menu for song rows. -->
<div class="ctx-menu glass hidden" id="ctxMenu">
    <button class="ctx-item" id="ctxPlay">
        <span class="material-icons-round">play_arrow</span>
        <span>Play</span>
    </button>
    <button class="ctx-item" id="ctxAddQueue">
        <span class="material-icons-round">queue_music</span>
        <span>Add to Queue</span>
    </button>
    <div class="ctx-sep"></div>
    <button class="ctx-item ctx-danger" id="ctxDelete">
        <span class="material-icons-round">delete_outline</span>
        <span>Delete</span>
    </button>
</div>

<audio id="audioEl" preload="none"></audio>

<script src="helpers.js"></script>
<script src="state.js"></script>
<script src="theme.js"></script>
<script src="render.js"></script>
<script src="playback.js"></script>
<script src="context.js"></script>
<script src="app.js"></script>
</body>
</html>
