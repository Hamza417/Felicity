<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Felicity — Music Server</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0e0e0e;
            --bg-secondary: #161616;
            --bg-tertiary: #222222;
            --bg-hover: #2a2a2a;
            --accent: #bb86fc;
            --accent-dim: rgba(187, 134, 252, 0.15);
            --text-primary: #f0f0f0;
            --text-secondary: #9e9e9e;
            --border: rgba(255, 255, 255, 0.07);
            --shadow: rgba(0, 0, 0, 0.6);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Sidebar */
        .sidebar {
            width: 360px;
            min-width: 260px;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 24px 20px 16px;
            border-bottom: 1px solid var(--border);
        }

        .app-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .app-brand-icon {
            font-size: 22px;
        }

        .app-brand-name {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.3px;
        }

        .search-wrapper {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .song-count {
            margin-top: 10px;
            font-size: 12px;
            color: var(--text-secondary);
            padding-left: 4px;
        }

        .song-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
        }

        .song-list::-webkit-scrollbar {
            width: 4px;
        }

        .song-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .song-list::-webkit-scrollbar-thumb {
            background: var(--bg-hover);
            border-radius: 2px;
        }

        .song-item {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            cursor: pointer;
            transition: background 0.12s;
            gap: 12px;
            border-left: 3px solid transparent;
        }

        .song-item:hover {
            background: var(--bg-hover);
        }

        .song-item.active {
            background: var(--accent-dim);
            border-left-color: var(--accent);
        }

        .song-art {
            width: 46px;
            height: 46px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--bg-tertiary);
        }

        .song-info {
            flex: 1;
            min-width: 0;
        }

        .song-title {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }

        .song-item.active .song-title {
            color: var(--accent);
        }

        .song-artist {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 3px;
        }

        .song-duration {
            font-size: 12px;
            color: var(--text-secondary);
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
        }

        /* Main Player Area */
        .player-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 40px;
            background: var(--bg-primary);
            overflow: hidden;
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-state h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .empty-state p {
            font-size: 14px;
        }

        .player-content {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .album-art-wrapper {
            width: 260px;
            height: 260px;
            border-radius: 20px;
            overflow: hidden;
            background: var(--bg-secondary);
            box-shadow: 0 20px 60px var(--shadow);
            margin-bottom: 36px;
            flex-shrink: 0;
        }

        .album-art-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .track-info {
            text-align: center;
            width: 100%;
            margin-bottom: 28px;
        }

        .track-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            font-size: 15px;
            color: var(--text-secondary);
            margin-top: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-album {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0.7;
        }

        /* Progress */
        .progress-section {
            width: 100%;
            margin-bottom: 24px;
        }

        .slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            position: relative;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 6px rgba(187, 134, 252, 0.5);
        }

        .slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: none;
        }

        .time-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
            font-variant-numeric: tabular-nums;
        }

        /* Controls */
        .controls-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 28px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.15s, transform 0.1s, background 0.15s;
        }

        .ctrl-btn:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        .ctrl-btn:active {
            transform: scale(0.88);
        }

        .play-btn {
            width: 60px;
            height: 60px;
            background: var(--accent) !important;
            color: #000 !important;
            border-radius: 50%;
            box-shadow: 0 4px 20px rgba(187, 134, 252, 0.4);
        }

        .play-btn:hover {
            background: #d0a5fd !important;
        }

        /* Volume */
        .volume-row {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 180px;
        }

        .volume-icon {
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .volume-slider {
            flex: 1;
        }

        @media (max-width: 680px) {
            body {
                flex-direction: column;
                overflow: auto;
                height: auto;
            }

            .sidebar {
                width: 100%;
                min-width: unset;
                border-right: none;
                border-bottom: 1px solid var(--border);
                max-height: 45vh;
            }

            .player-area {
                padding: 28px 24px 40px;
            }

            .album-art-wrapper {
                width: 200px;
                height: 200px;
            }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="app-brand">
            <span class="app-brand-icon">🎵</span>
            <span class="app-brand-name">Felicity</span>
        </div>
        <div class="search-wrapper">
            <svg class="search-icon" fill="currentColor" height="16" viewBox="0 0 24 24" width="16">
                <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            <input class="search-input" id="searchInput" placeholder="Search songs, artists, albums…"
                   type="text">
        </div>
        <div class="song-count" id="songCount">Loading library…</div>
    </div>
    <div class="song-list" id="songList"></div>
</div>

<div class="player-area">
    <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">🎶</div>
        <h2>Pick a song to start</h2>
        <p>Select a track from your library on the left</p>
    </div>

    <div class="player-content" id="playerContent" style="display:none;">
        <div class="album-art-wrapper">
            <img alt="Album Art" class="album-art-img" id="albumArt" src="">
        </div>

        <div class="track-info">
            <div class="track-title" id="trackTitle">Unknown</div>
            <div class="track-artist" id="trackArtist"></div>
            <div class="track-album" id="trackAlbum"></div>
        </div>

        <div class="progress-section">
            <input class="slider" id="progressBar" max="100" min="0" step="0.1" type="range"
                   value="0">
            <div class="time-row">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <div class="controls-row">
            <button class="ctrl-btn" id="prevBtn" title="Previous">
                <svg fill="currentColor" height="24" viewBox="0 0 24 24" width="24">
                    <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
                </svg>
            </button>
            <button class="ctrl-btn play-btn" id="playBtn" title="Play / Pause">
                <svg fill="currentColor" height="28" id="playIcon" viewBox="0 0 24 24" width="28">
                    <path d="M8 5v14l11-7z"/>
                </svg>
            </button>
            <button class="ctrl-btn" id="nextBtn" title="Next">
                <svg fill="currentColor" height="24" viewBox="0 0 24 24" width="24">
                    <path d="m6 18 8.5-6L6 6v12zM16 6h2v12h-2z"/>
                </svg>
            </button>
        </div>

        <div class="volume-row">
            <svg class="volume-icon" fill="currentColor" height="18" viewBox="0 0 24 24" width="18">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
            <input class="slider volume-slider" id="volumeBar" max="100" min="0" type="range"
                   value="100">
        </div>
    </div>
</div>

<audio id="audioPlayer" preload="none"></audio>

<script>
    "use strict";

    const audio         = document.getElementById("audioPlayer");
    const playBtn       = document.getElementById("playBtn");
    const playIcon      = document.getElementById("playIcon");
    const prevBtn       = document.getElementById("prevBtn");
    const nextBtn       = document.getElementById("nextBtn");
    const progressBar   = document.getElementById("progressBar");
    const currentTimeEl = document.getElementById("currentTime");
    const totalTimeEl   = document.getElementById("totalTime");
    const volumeBar     = document.getElementById("volumeBar");
    const songListEl    = document.getElementById("songList");
    const searchInput   = document.getElementById("searchInput");
    const songCountEl   = document.getElementById("songCount");
    const emptyState    = document.getElementById("emptyState");
    const playerContent = document.getElementById("playerContent");
    const albumArtEl    = document.getElementById("albumArt");
    const trackTitleEl  = document.getElementById("trackTitle");
    const trackArtistEl = document.getElementById("trackArtist");
    const trackAlbumEl  = document.getElementById("trackAlbum");

    let songs          = [];
    let filtered       = [];
    let currentIndex   = -1;
    let seeking        = false;

    /** Formats a millisecond duration as m:ss. */
    function fmt(ms) {
        const s   = Math.floor(ms / 1000);
        const min = Math.floor(s / 60);
        const sec = (s % 60).toString().padStart(2, "0");
        return min + ":" + sec;
    }

    /** Escapes HTML special characters. */
    function esc(text) {
        const d = document.createElement("div");
        d.appendChild(document.createTextNode(text || ""));
        return d.innerHTML;
    }

    /** Renders the filtered song list. */
    function renderList() {
        songListEl.innerHTML = "";
        filtered.forEach(function(song) {
            const origIdx = songs.indexOf(song);
            const item    = document.createElement("div");
            item.className = "song-item" + (origIdx === currentIndex ? " active" : "");
            item.innerHTML =
                "<img class='song-art' src='/api/songs/" + song.id + "/art' loading='lazy' alt='Art'>" +
                "<div class='song-info'>" +
                    "<div class='song-title'>" + esc(song.title || song.name) + "</div>" +
                    "<div class='song-artist'>" + esc(song.artist || "Unknown Artist") + "</div>" +
                "</div>" +
                "<div class='song-duration'>" + fmt(song.duration) + "</div>";
            item.addEventListener("click", function() { playSong(origIdx); });
            songListEl.appendChild(item);
        });
    }

    /** Starts playback for the song at the given global index. */
    function playSong(index) {
        currentIndex = index;
        const song = songs[index];

        audio.src = "/api/songs/" + song.id + "/stream";
        audio.load();
        audio.play();

        trackTitleEl.textContent  = song.title || song.name || "Unknown";
        trackArtistEl.textContent = song.artist || "Unknown Artist";
        trackAlbumEl.textContent  = song.album  || "";
        albumArtEl.src            = "/api/songs/" + song.id + "/art";

        emptyState.style.display    = "none";
        playerContent.style.display = "flex";

        document.title = (song.title || song.name) + " — Felicity";
        renderList();
    }

    /** Fetches the full library from the server. */
    async function loadLibrary() {
        try {
            const res = await fetch("/api/songs");
            songs     = await res.json();
            filtered  = songs.slice();
            songCountEl.textContent = songs.length + " songs";
            renderList();
        } catch (e) {
            songCountEl.textContent = "Failed to load library";
        }
    }

    /* Play / Pause */
    playBtn.addEventListener("click", function() {
        if (currentIndex < 0 && songs.length > 0) { playSong(0); return; }
        if (audio.paused) audio.play(); else audio.pause();
    });

    audio.addEventListener("play",  function() {
        playIcon.innerHTML = "<path d='M6 19h4V5H6v14zm8-14v14h4V5h-4z'/>";
    });
    audio.addEventListener("pause", function() {
        playIcon.innerHTML = "<path d='M8 5v14l11-7z'/>";
    });

    /* Previous / Next */
    prevBtn.addEventListener("click", function() {
        if (currentIndex > 0) playSong(currentIndex - 1);
    });
    nextBtn.addEventListener("click", function() {
        if (currentIndex < songs.length - 1) playSong(currentIndex + 1);
    });
    audio.addEventListener("ended", function() {
        if (currentIndex < songs.length - 1) playSong(currentIndex + 1);
    });

    /* Progress bar */
    audio.addEventListener("timeupdate", function() {
        if (!seeking && audio.duration) {
            progressBar.value       = (audio.currentTime / audio.duration) * 100;
            currentTimeEl.textContent = fmt(audio.currentTime * 1000);
        }
    });
    audio.addEventListener("loadedmetadata", function() {
        totalTimeEl.textContent = fmt(audio.duration * 1000);
    });
    progressBar.addEventListener("mousedown",  function() { seeking = true; });
    progressBar.addEventListener("touchstart", function() { seeking = true; });
    progressBar.addEventListener("input",      function() {
        if (audio.duration) currentTimeEl.textContent = fmt((progressBar.value / 100) * audio.duration * 1000);
    });
    progressBar.addEventListener("change", function() {
        if (audio.duration) audio.currentTime = (progressBar.value / 100) * audio.duration;
        seeking = false;
    });

    /* Volume */
    volumeBar.addEventListener("input", function() {
        audio.volume = volumeBar.value / 100;
    });

    /* Search */
    searchInput.addEventListener("input", function() {
        const q  = searchInput.value.toLowerCase();
        filtered = q
            ? songs.filter(function(s) {
                return (s.title || s.name || "").toLowerCase().includes(q)
                    || (s.artist || "").toLowerCase().includes(q)
                    || (s.album  || "").toLowerCase().includes(q);
              })
            : songs.slice();
        songCountEl.textContent = filtered.length + " / " + songs.length + " songs";
        renderList();
    });

    loadLibrary();
</script>
</body>
</html>
